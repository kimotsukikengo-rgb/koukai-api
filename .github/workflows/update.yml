name: Update API dataset

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build dataset
        run: python3 papis.py build

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/apis.db data/apis.json; then
            echo "No dataset changes."
            exit 0
          fi
          git config user.name "papis-bot"
          git config user.email "papis-bot@users.noreply.github.com"
          git add data/apis.db data/apis.json
          git commit -m "chore: refresh API dataset $(date -u +%Y-%m-%d)"
          git push
